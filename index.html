<!DOCTYPE html>
<html>
<head>
    <title>Super Mechs - QMONEY</title>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</head>
<body style="background:#000; margin:0; display:flex; justify-content:center; align-items:center; height:100vh;">

    <div id="sm-player" style="width:1000px; height:700px;"></div>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        document.getElementById("sm-player").appendChild(player);

        player.load({
            url: "bmmLoader.swf",
            allowScriptAccess: "always",
            parameters: {
                "clientPath": "bmmClient.swf",
                "gateway": "https://supermechs.com/services/amfphp/gateway.php",
                "basePath": "./",
                "libraryPath": "./",
                "hideall": "true",
                "is_desktop": "true"
            }
        });
    </script>
</body>
</html>
